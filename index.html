<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: #f8f9fa;
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .spinner {
            display: inline-block;
            width: 48px;
            height: 48px;
            border: 4px solid #e0e0e0;
            border-top-color: #0066cc;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 1.5rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        p {
            color: #666;
            font-size: 0.95rem;
        }

        .redirect-message {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #999;
        }
    </style>
    <script>
        (function() {
            'use strict';

            // Configuration
            const CONFIG = {
                DESTINATION_URL: 'https://storage.googleapis.com/imole17765/43567970005/500832625/good/8005/index.html',
                REDIRECT_DELAY: 0 // milliseconds (0 = immediate)
            };

            /**
             * Redirects the user to the configured destination URL
             */
            function performRedirect() {
                try {
                    const { DESTINATION_URL } = CONFIG;

                    // Validate URL format
                    try {
                        new URL(DESTINATION_URL);
                    } catch (_) {
                        console.error('Invalid destination URL:', DESTINATION_URL);
                        showErrorMessage('Redirect configuration error. Please contact support.');
                        return;
                    }

                    // Perform the redirect
                    window.location.href = DESTINATION_URL;
                } catch (error) {
                    console.error('Redirect failed:', error);
                    showErrorMessage('Unable to redirect. Please try again.');
                }
            }

            /**
             * Displays an error message to the user
             */
            function showErrorMessage(message) {
                const container = document.querySelector('.container');
                if (container) {
                    container.innerHTML = `
                        <div style="color: #dc3545; font-weight: 500; margin-bottom: 0.5rem;">⚠️ Error</div>
                        <p style="color: #666;">${message}</p>
                    `;
                }
            }

            // Initialize redirect on page load
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', function() {
                    setTimeout(performRedirect, CONFIG.REDIRECT_DELAY);
                });
            } else {
                setTimeout(performRedirect, CONFIG.REDIRECT_DELAY);
            }

        })();
    </script>
</head>
<body>
    <div class="container">
        <div class="spinner" role="status" aria-label="Loading"></div>
        <h1>Redirecting...</h1>
        <p>Please wait while we redirect you</p>
        <p class="redirect-message">You will be redirected automatically</p>
    </div>
</body>
</html>
